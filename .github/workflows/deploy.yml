name: deploy
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: pull
        working-directory: /www/swarm-api/
        run: git reset --hard && git pull

      - name: restart
        working-directory: /www/swarm-api/
        run: chmod +x restart.sh && ./restart.sh
